name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check backend/ --config pyproject.toml

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          # Install only the lightweight deps needed for unit tests
          pip install \
            fastapi==0.104.1 \
            uvicorn==0.24.0 \
            pydantic>=2.5.0 \
            pydantic-settings>=2.0.0 \
            python-dotenv>=1.0.0 \
            starlette>=0.27.0 \
            httpx>=0.25.0 \
            aiohttp>=3.9.0 \
            aiofiles>=23.2.0 \
            pytest>=7.4.0 \
            pytest-asyncio>=0.23.0

      - name: Create minimal .env for tests
        working-directory: backend
        run: |
          echo "ENVIRONMENT=development" > .env
          echo "LOG_LEVEL=WARNING" >> .env
          echo "LLM_PROVIDER=" >> .env

      - name: Run unit tests
        working-directory: backend
        run: |
          python -m pytest tests/test_context.py tests/test_cache_service.py tests/test_prompt_builder.py tests/test_rate_limiter.py -v --tb=short

  syntax:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check all Python files compile
        working-directory: backend
        run: |
          find . -name "*.py" -not -path "./__pycache__/*" -not -path "./backup_*/*" | while read f; do
            python -c "import ast; ast.parse(open('$f', encoding='utf-8').read())" && echo "OK: $f" || { echo "FAIL: $f"; exit 1; }
          done
